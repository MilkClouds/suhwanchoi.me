name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  # Don't cancel an in-progress run -- let production deploys finish (GitHub's
  # recommended setting for Pages).
  cancel-in-progress: false

jobs:
  # Build the deployable site via scripts/build.sh (the same script used for
  # local preview) and upload it as the Pages artifact. Runs on every push and
  # PR, so PRs exercise the real build.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # Cache the downloaded .debs (apt's archive dir, redirected to a
      # user-owned path so actions/cache needs no root). Re-runs skip the large
      # texlive-fonts-extra download. Bump -v1 if the package list below changes.
      - name: Cache TeX Live packages
        uses: actions/cache@v4
        with:
          path: ~/tl-debs
          key: tl-debs-${{ runner.os }}-v1

      - name: Install TeX Live
        run: |
          mkdir -p ~/tl-debs
          # Retry + per-connection timeout so a stalled mirror fails fast and
          # retries instead of hanging the job.
          opts="-o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30"
          sudo apt-get $opts update
          sudo DEBIAN_FRONTEND=noninteractive apt-get $opts install -y --no-install-recommends \
            -o Dir::Cache::archives="$HOME/tl-debs" \
            latexmk \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            lmodern

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Build site
        run: bash scripts/build.sh

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  # Publish the artifact. Only on pushes to main; PRs build but never deploy.
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
